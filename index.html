<script>
    const SUPABASE_URL = 'https://zibslyxkfixiqyuczrfp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_nd9sX-EYwAqKmF5CjxTmIQ_wWjSYtgC';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let authMode = 'login';

    function toggleAuthMode(mode) {
        authMode = mode;
        const loginToggle = document.getElementById('login-toggle');
        const signupToggle = document.getElementById('signup-toggle');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const forgotLink = document.getElementById('forgot-link');
        const rememberRow = document.getElementById('remember-row');

        if (mode === 'login') {
            loginToggle.className = 'px-6 py-2 rounded-md font-label-sm text-primary bg-white shadow-sm transition-all';
            signupToggle.className = 'px-6 py-2 rounded-md font-label-sm text-on-surface-variant hover:text-primary transition-all';
            authTitle.textContent = 'Welcome Back';
            authSubtitle.textContent = 'Please enter your details to access your trips.';
            authSubmitBtn.textContent = 'Sign In';
            forgotLink.classList.remove('hidden');
            rememberRow.classList.remove('hidden');
        } else {
            signupToggle.className = 'px-6 py-2 rounded-md font-label-sm text-primary bg-white shadow-sm transition-all';
            loginToggle.className = 'px-6 py-2 rounded-md font-label-sm text-on-surface-variant hover:text-primary transition-all';
            authTitle.textContent = 'Create Account';
            authSubtitle.textContent = 'Join Traveloop and start planning your perfect escape.';
            authSubmitBtn.textContent = 'Sign Up & Verify Email';
            forgotLink.classList.add('hidden');
            rememberRow.classList.add('hidden');
        }
    }

    async function handleAuthSubmit() {
        console.log('Attempting auth submit...', authMode);
        const email = document.getElementById('email-input').value;
        const password = document.getElementById('password-input').value;

        if (!email || !password) {
            alert("Please enter both email and password!");
            return;
        }

        try {
            if (authMode === 'signup') {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                });

                if (error) {
                    alert("Error: " + error.message);
                } else {
                    alert("Success! Please check your email for the verification link.");
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    alert("Error: " + error.message);
                } else {
                    console.log('Login successful, user:', data.user);
                    localStorage.setItem('traveloop_user', JSON.stringify(data.user));
                    localStorage.setItem('traveloop_token', data.session.access_token);
                    window.location.href = 'dashboard.html';
                }
            }
        } catch (err) {
            console.error('Auth Error:', err);
            alert("An unexpected error occurred. Please check the console.");
        }
    }
</script>
